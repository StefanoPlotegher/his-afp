<header class="flex flex-row items-center shadow-md backdrop-opacity-5">
    <!--- LOGO -->
    <div class="flex items-center justify-center p-1">
        <img class="w-20" src="logo-asuit.svg" alt="logoASUIT" >
    </div>
    <!--- AZIENDA : Località + Reparto passate dal ts così se cambiano li cambiano qui (figo no?) -->
    <div class="pl-1">
        <h1 class="text-4xl font-bold text-primary">{{reparto}}</h1>
        <P class="text-md text-gray-600 dark:text-gray-100">{{struttura}}
            @switch (type) {
                @case ('PROD') {
                    <p-tag severity="info" value="v{{version}} - {{type}}"/>
                }
                @case ('TEST') {
                    <p-tag severity="success" value="v{{version}} - {{type}}"/>
                }
                @case ('SVI') {
                    <p-tag severity="contrast" value="v{{version}} - {{type}}"/>
                }
                @case ('LOCAL') {
                    <p-tag severity="secondary" value="v{{version}} - {{type}}"/>
                }
            }
        </P>
    </div>
    <!--DIVIDER-->
    <p-divider layout="vertical"/>
    <!--QUI SOTTO FA LA STESSA COSA MA SINC è PIU' BELLA MA CONSIGLIANO DI USARE QUELLA SOPRA PERCHE' C'E' LA LIBRERIA APPOSTA (BUUUUU)-->
    <div class="border-l h-10 mx-1"></div>
    <!--- AZIONI -->
    <nav class="flex flex-row items-center gap-3 pl-4">
        
    <!--bottoni per navigare (non in mare) (PZ purtroppo non sta per pizza)-->
    <p-button
        label="Lista PZ"
        routerLink="/lista-pz"
        variant="outlined"
    />
    <p-button
        label="Accettazione PZ"
        routerLink="/accettazione-pz"
        variant="outlined"
    />
    <p-button
        label="Stato Servizi"
        routerLink="/stato-servizi"
        variant="outlined"
    />
    </nav>
    <div class="ml-auto mr-4">
    <his-darkmode-selector/>
    </div>
</header>
