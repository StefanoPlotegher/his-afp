server{
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://fe-prod:80;
    }

    location /api/ {
        proxy_pass http://sio-backend:3000;
    }
}

server{
    listen 8999;
    #server_name localhost;

    location / {
        proxy_pass http://fe-sio:80;
    }

    location /api/ {
        proxy_pass http://sio-backend:3000;
    }
}

server{
    listen 8080;
    #server_name localhost;

    location / {
        proxy_pass http://fe-test:80;
    }

    location /api/ {
        proxy_pass http://sio-backend:3000;
    }
}